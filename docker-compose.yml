services:
  mysql:
    image: mysql:8.0
    container_name: value-screener-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: value_screener
      MYSQL_USER: screener
      MYSQL_PASSWORD: screener
    ports:
      - "3306:3306"
    volumes:
      - value_screener_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: value-screener-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  value_screener_mysql_data:
